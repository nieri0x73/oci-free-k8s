apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-credentials
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vaultwarden-credentials
  dataFrom:
    - extract:
        key: secret/vaultwarden
