apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: keycloak
  namespace: security
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: keycloak-tls
      hosts:
        - keycloak.NIP_IO_PLACEHOLDER
        - iam.nieri0x73.com
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - keycloak.NIP_IO_PLACEHOLDER
        - iam.nieri0x73.com
