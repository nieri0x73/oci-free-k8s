apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zitadel-credentials
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: zitadel-credentials
  dataFrom:
    - extract:
        key: secret/zitadel
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
