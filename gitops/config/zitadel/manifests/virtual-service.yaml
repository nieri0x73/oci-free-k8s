apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: zitadel
  namespace: security
spec:
  hosts:
    - iam.nieri0x73.com
  gateways:
    - zitadel
  http:
    - match:
        - uri:
            prefix: /ui/v2/login
      route:
        - destination:
            host: zitadel-login
            port:
              number: 3000
    - route:
        - destination:
            host: zitadel
            port:
              number: 8080
