preUpgradeChecker:
  jobEnabled: false
defaultSettings:
  defaultReplicaCount: 2
  storageMinimalAvailablePercentage: 10
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  autoDeletePodWhenVolumeDetachedUnexpectedly: true
  guaranteedInstanceManagerCpu: 5
  replicaReplenishmentWaitInterval: 300
  concurrentReplicaRebuildPerNodeLimit: 2
persistence:
  defaultClass: true
  defaultClassReplicaCount: 2
longhornManager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
longhornDriver:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
longhornUI:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
metrics:
  serviceMonitor:
    enabled: false
