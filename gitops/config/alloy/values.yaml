alloy:
  configMap:
    create: true
    content: |-
      logging {
        level  = "warn"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          replacement  = "/api/v1/nodes/" + sys.env("HOSTNAME") + "/proxy/metrics/cadvisor"
          target_label = "__metrics_path__"
        }
        rule {
          replacement  = "kubernetes.default.svc:443"
          target_label = "__address__"
        }
      }

      prometheus.scrape "cadvisor" {
        targets           = discovery.relabel.cadvisor.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "kubelet" {
        targets           = discovery.relabel.cadvisor.output
        job_name          = "kubelet"
        scheme            = "https"
        metrics_path      = "/metrics"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      discovery.relabel "pod_metrics" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pods" {
        targets    = discovery.relabel.pod_metrics.output
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = sys.env("MIMIR_URL")
          basic_auth {
            username = sys.env("MIMIR_USERNAME")
            password = sys.env("MIMIR_PASSWORD")
          }
        }
        external_labels = {
          cluster = "oci-free-k8s",
        }
      }

      local.file_match "pod_logs" {
        path_targets = [{
          __path__ = "/var/log/pods/*/*/*.log",
        }]
      }

      loki.process "pod_logs" {
        forward_to = [loki.write.grafana_cloud.receiver]

        stage.match {
          selector = "{filename=~\".+\"}"
          stage.regex {
            expression = "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_(?P<pod_uid>[^/]+)/(?P<container>[^/]+)/.+\\.log"
            source     = "filename"
          }
          stage.labels {
            values = {
              namespace = "",
              pod       = "",
              container = "",
            }
          }
          stage.label_drop {
            values = ["filename"]
          }
        }
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.write "grafana_cloud" {
        endpoint {
          url = sys.env("LOKI_URL")
          basic_auth {
            username = sys.env("LOKI_USERNAME")
            password = sys.env("LOKI_PASSWORD")
          }
        }
        external_labels = {
          cluster = "oci-free-k8s",
        }
      }
  envFrom:
    - secretRef:
        name: alloy-credentials
  mounts:
    varlog: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
controller:
  type: daemonset
rbac:
  create: true
serviceMonitor:
  enabled: false
crds:
  create: false
