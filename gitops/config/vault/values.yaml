injector:
  enabled: false
server:
  image:
    repository: docker.io/hashicorp/vault
  dev:
    enabled: false
  ha:
    enabled: false
  extraSecretEnvironmentVars:
    - envName: VAULT_SEAL_KEY_ID
      secretName: vault-kms-secret
      secretKey: VAULT_SEAL_KEY_ID
    - envName: VAULT_SEAL_CRYPTO_ENDPOINT
      secretName: vault-kms-secret
      secretKey: VAULT_SEAL_CRYPTO_ENDPOINT
    - envName: VAULT_SEAL_MANAGEMENT_ENDPOINT
      secretName: vault-kms-secret
      secretKey: VAULT_SEAL_MANAGEMENT_ENDPOINT
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      seal "ocikms" {
        key_id              = env("VAULT_SEAL_KEY_ID")
        crypto_endpoint     = env("VAULT_SEAL_CRYPTO_ENDPOINT")
        management_endpoint = env("VAULT_SEAL_MANAGEMENT_ENDPOINT")
        auth_type_api_key   = false
      }
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: longhorn
ui:
  enabled: true
