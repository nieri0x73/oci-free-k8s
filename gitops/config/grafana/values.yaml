cluster:
  name: oci-free-k8s
destinations:
  grafanaCloudMetrics:
    type: prometheus
    urlFrom: sys.env("PROMETHEUS_URL")
    auth:
      type: basic
      usernameKey: PROMETHEUS_USERNAME
      passwordKey: PROMETHEUS_PASSWORD
    secret:
      create: false
      name: grafana-credentials
      namespace: monitoring
  grafanaCloudLogs:
    type: loki
    urlFrom: sys.env("LOKI_URL")
    auth:
      type: basic
      usernameKey: LOKI_USERNAME
      passwordKey: LOKI_PASSWORD
    secret:
      create: false
      name: grafana-credentials
      namespace: monitoring
clusterMetrics:
  enabled: true
  collector: alloy-metrics
hostMetrics:
  enabled: true
  collector: alloy-metrics
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
collectors:
  alloy-metrics:
    enabled: true
    presets:
      - clustered
    alloy:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      envFrom:
        - secretRef:
            name: grafana-credentials
  alloy-logs:
    enabled: true
    presets:
      - filesystem-log-reader
    alloy:
      resources:
        requests:
          cpu: 50m
          memory: 192Mi
        limits:
          cpu: 300m
          memory: 384Mi
      envFrom:
        - secretRef:
            name: grafana-credentials
  alloy-singleton:
    enabled: true
    alloy:
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      envFrom:
        - secretRef:
            name: grafana-credentials
kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
