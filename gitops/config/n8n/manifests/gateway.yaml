apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: n8n
  namespace: apps
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: n8n-tls
      hosts:
        - n8n.NIP_IO_PLACEHOLDER
        - n8n.DNS_PLACEHOLDER
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - n8n.NIP_IO_PLACEHOLDER
        - n8n.DNS_PLACEHOLDER
